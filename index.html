<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Q1 商品委員會季檢討 | 順可通訊處</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --secondary-blue: #003d80;
            --accent-gold: #ffd700;
            --light-bg: #f8f9fa;
            --text-dark: #333;
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
        }

        header {
            background: linear-gradient(rgba(0, 86, 179, 0.9), rgba(0, 61, 128, 0.9));
            color: white;
            padding: 3rem 1rem;
            text-align: center;
        }

        .container { max-width: 900px; margin: -20px auto 2rem; padding: 0 1.5rem; }

        .section-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h2 {
            color: var(--primary-blue);
            border-left: 5px solid var(--accent-gold);
            padding-left: 15px;
            margin-bottom: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .item-card {
            background: var(--light-bg);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #eee;
            text-align: center;
            transition: 0.3s;
            position: relative;
        }

        .item-card:hover { transform: translateY(-5px); border-color: var(--primary-blue); }

        .btn-download {
            display: inline-block;
            background-color: var(--primary-blue);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        .btn-download:hover { background-color: var(--secondary-blue); }

        .coming-soon { background: #fdfdfd; border: 2px dashed #ccc; opacity: 0.7; }
        .status-badge {
            position: absolute; top: 10px; right: 10px;
            background: #ff4757; color: white; font-size: 0.7rem;
            padding: 2px 8px; border-radius: 10px;
        }

        .team-img {
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            margin-top: 1rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        footer { text-align: center; padding: 2rem; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>2026 Q1 商品委員會報告</h1>
    <p>順可通訊處 | 商品主委 吳約翰 (John Goh)</p>
</header>

<div class="container">
    
    <section class="section-card">
        <h2>Q1 實戰推銷夾下載</h2>
        <p>點擊按鈕即可下載本季開發之銷售輔助工具：</p>
        <div class="grid">
            <div class="item-card">
                <span style="font-size: 2rem;">🏥</span>
                <h3>長照推銷夾</h3>
                <a href="long_term_care.pdf" class="btn-download">立即下載</a>
            </div>
            <div class="item-card">
                <span style="font-size: 2rem;">⚖️</span>
                <h3>複雜稅務簡單說</h3>
                <a href="tax_guide.pdf" class="btn-download">立即下載</a>
            </div>
            <div class="item-card">
                <span style="font-size: 2rem;">💰</span>
                <h3>儲蓄推銷夾</h3>
                <a href="savings_plan.pdf" class="btn-download">立即下載</a>
            </div>
            <div class="item-card coming-soon">
                <span class="status-badge">即將推出</span>
                <span style="font-size: 2rem; filter: grayscale(100%);">🛡️</span>
                <h3 style="color: #888;">重大傷病推銷夾</h3>
                <span class="btn-download" style="background: #ccc;">製作中</span>
            </div>
        </div>
    </section>

    <section class="section-card" style="text-align: center;">
        <h2>商品委員會：黃金陣容</h2>
        <p>專業引領 · 實戰賦能 · 成為你最強的銷售後盾</p>
        <img src="member_list.png" alt="商品委員會成員" class="team-img">
    </section>

    <footer>
        <p>&copy; 2026 順可通訊處 商品委員會</p>
    </footer>
</div>

</body>
</html>
